<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Subten — User Manual</title>
<style>
  body{font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       max-width:520px;margin:12vh auto;padding:0 24px;text-align:center;color:#1c1c1e}
  @media (prefers-color-scheme:dark){body{background:#151517;color:#e9e9ec}}
  h1{font-size:1.5rem;margin:.2em 0 .1em}
  p{color:#6b6b70;margin:.2em 0 1.6em}
  a.lang{display:inline-block;margin:.4em;padding:.7em 1.4em;border-radius:10px;
         background:#2e9e5b;color:#fff;text-decoration:none;font-weight:600}
  a.lang:hover{opacity:.9}
</style>
<script>
  // Redirect to the reader's language if it's one we have; otherwise show the chooser.
  (function(){
    var l=(navigator.language||"en").slice(0,2).toLowerCase();
    if(l==="sk"||l==="cs"||l==="en"){ location.replace(l+".html"); }
  })();
</script>
</head>
<body>
  <h1>Subten — User Manual</h1>
  <p>Choose your language · Vyberte jazyk · Vyberte jazyk</p>
  <a class="lang" href="sk.html">Slovenčina</a>
  <a class="lang" href="cs.html">Čeština</a>
  <a class="lang" href="en.html">English</a>
</body>
</html>
