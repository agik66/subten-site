<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<!-- Source for assets/brand/og-calculator.png (1200×630). Render headless at 1200×630 and screenshot. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Schibsted+Grotesk:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#060807; --surface:#121613; --surface-2:#1A1F1B;
    --border:rgba(255,255,255,.10); --ink:#F4F7F4; --ink-2:#AFB7B0; --ink-3:#6E776F;
    --accent:#4FD389; --accent-strong:#2FBE6E; --accent-ink:#0A1A10;
    --c-protein:#E0746A; --c-carbs:#E0A340; --c-fat:#78A2CA;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:630px;overflow:hidden;}
  body{
    background:
      radial-gradient(90% 120% at 78% -20%, rgba(79,211,137,.20), transparent 55%),
      radial-gradient(70% 90% at 8% 110%, rgba(47,190,110,.10), transparent 60%),
      var(--bg);
    color:var(--ink); font-family:"Manrope",system-ui,sans-serif;
    display:flex; align-items:center; -webkit-font-smoothing:antialiased;
    letter-spacing:-.01em;
  }
  .wrap{display:flex; align-items:center; gap:56px; padding:0 72px; width:100%;}
  .left{flex:1; min-width:0;}
  .brand{display:flex; align-items:center; gap:14px; margin-bottom:30px;}
  .brand img{width:48px; height:48px; border-radius:11px; display:block;}
  .brand b{font-family:"Schibsted Grotesk",sans-serif; font-weight:800; font-size:30px; letter-spacing:-.04em;}
  .kicker{display:inline-flex; align-items:center; gap:9px; font-size:16px; font-weight:700;
    letter-spacing:.14em; text-transform:uppercase; color:var(--accent); margin-bottom:18px;}
  .kicker::before{content:""; width:26px; height:2px; background:currentColor; opacity:.6;}
  h1{font-family:"Schibsted Grotesk",sans-serif; font-weight:800; font-size:68px; line-height:1.02;
    letter-spacing:-.035em; margin-bottom:22px;}
  h1 .g{background:linear-gradient(100deg,#5FE39A,#2FBE6E); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .sub{font-size:25px; color:var(--ink-2); font-weight:550; line-height:1.4; max-width:560px; margin-bottom:30px;}
  .pills{display:flex; gap:12px; flex-wrap:wrap;}
  .pill{font-size:17px; font-weight:650; color:var(--ink); background:var(--surface);
    border:1px solid var(--border); border-radius:999px; padding:10px 20px;}
  .pill.accent{background:rgba(79,211,137,.12); border-color:rgba(79,211,137,.35); color:var(--accent);}

  /* result card mock */
  .card{width:386px; flex:none; background:var(--surface); border:1px solid var(--border);
    border-radius:28px; padding:30px 30px 26px; box-shadow:0 40px 90px -40px rgba(0,0,0,.85);}
  .row{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:18px;}
  .row .k{font-size:17px; color:var(--ink-2); font-weight:600;}
  .row .v{font-family:"Schibsted Grotesk",sans-serif; font-weight:800; font-size:30px; letter-spacing:-.03em;}
  .row.big .v{font-size:46px; color:var(--accent);}
  .row .v small{font-size:18px; color:var(--ink-3); font-weight:600; margin-left:3px;}
  .divider{height:1px; background:var(--border); margin:6px 0 20px;}
  .macros{margin-top:6px;}
  .mlabel{font-size:14px; color:var(--ink-3); font-weight:650; text-transform:uppercase; letter-spacing:.08em; margin-bottom:11px;}
  .bar{height:26px; border-radius:8px; display:flex; overflow:hidden; border:1px solid var(--border);}
  .seg{height:100%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:#0A1A10;}
  .seg.p{background:var(--c-protein); width:33%;}
  .seg.c{background:var(--c-carbs); width:46%;}
  .seg.f{background:var(--c-fat); width:21%;}
  .legend{display:flex; gap:18px; margin-top:13px;}
  .legend span{display:flex; align-items:center; gap:7px; font-size:15px; color:var(--ink-2); font-weight:600;}
  .legend i{width:12px; height:12px; border-radius:4px; display:block;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="left">
      <div class="brand"><img src="/assets/brand/subten-logo.png" alt="" /><b>Subten</b></div>
      <div class="kicker">Free nutrition calculator</div>
      <h1>BMR, TDEE<br>&amp; <span class="g">macros</span></h1>
      <p class="sub">Your daily calorie target and macros with carb cycling — instant, in your browser.</p>
      <div class="pills">
        <span class="pill accent">100% free</span>
        <span class="pill">No signup</span>
        <span class="pill">EN · SK · CZ</span>
      </div>
    </div>

    <div class="card">
      <div class="row"><span class="k">BMR</span><span class="v">1768<small> kcal</small></span></div>
      <div class="row"><span class="k">TDEE</span><span class="v">2651<small> kcal</small></span></div>
      <div class="divider"></div>
      <div class="row big"><span class="k">Daily target</span><span class="v">2151<small> kcal</small></span></div>
      <div class="macros">
        <div class="mlabel">Macros</div>
        <div class="bar"><div class="seg p">P</div><div class="seg c">C</div><div class="seg f">F</div></div>
        <div class="legend">
          <span><i style="background:var(--c-protein)"></i>180 g</span>
          <span><i style="background:var(--c-carbs)"></i>250 g</span>
          <span><i style="background:var(--c-fat)"></i>59 g</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
